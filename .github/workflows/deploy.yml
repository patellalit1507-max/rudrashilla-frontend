name: Build & Deploy to GitHub Pages

on:
  push:
    branches: [main]       # deploy on every push to main
  workflow_dispatch:        # allow manual trigger from the GitHub UI

# Required for the deploy-pages action to publish
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; don't cancel a running deploy mid-flight
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ── 1. Build ──────────────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc -b --noEmit

      - name: Build
        run: npm run build
        env:
          # Custom domain rudrashilla.com serves from root — base path is /
          # This is read by vite.config.ts (base) and src/App.tsx (BrowserRouter basename)
          VITE_BASE_PATH: /
          # Set VITE_API_URL in: repo Settings → Secrets → Actions → New secret
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  # ── 2. Deploy ─────────────────────────────────────────────────────────────
  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
