name: Keep Backend Alive

on:
  schedule:
    - cron: '*/10 * * * *'   # every 14 minutes — Render sleeps after 15 min idle
  workflow_dispatch:          # manual trigger from GitHub UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://rudrashilla-backend.onrender.com/api/health)
          echo "Health check status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "WARNING: Backend returned $STATUS"
            exit 1
          fi
          echo "Backend is alive."
