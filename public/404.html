<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Rudrashila</title>
    <script>
      // SPA routing fix for GitHub Pages.
      // When a user refreshes or navigates directly to a route like /product/123,
      // GitHub Pages serves this 404.html (no matching file on disk).
      // We encode the intended path into the query string and redirect to the root,
      // where spa-redirect.js picks it up and restores the real URL before React loads.
      // Reference: https://github.com/rafgraph/spa-github-pages
      var pathSegmentsToKeep = 0; // 0 = custom domain serves from root (no sub-path prefix)
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.host +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
